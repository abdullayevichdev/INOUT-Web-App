<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A20D4" />
      <stop offset="100%" stop-color="#FD6C1D" />
    </linearGradient>
    
    <!-- Laptop screen glow -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <!-- Sparkle Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Squirecle with shadow -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)" />

  <!-- Outer Ring glow -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="8" />

  <!-- Laptop Figure Group -->
  <g transform="translate(16, 16)">
    <!-- Sparkles (AI / Smart Choice indicator) -->
    <path d="M 330 80 L 336 100 L 356 106 L 336 112 L 330 132 L 324 112 L 304 106 L 324 100 Z" fill="#ADF762" filter="url(#glow)" />
    <path d="M 120 180 L 123 190 L 133 193 L 123 196 L 120 206 L 117 196 L 107 193 L 117 190 Z" fill="#ADF762" opacity="0.8" />
    
    <!-- Laptop Lid/Screen (Bezel) -->
    <rect x="120" y="130" width="240" height="150" rx="14" fill="#0F172A" stroke="#FFFFFF" stroke-width="3" />
    
    <!-- Inner Screen -->
    <rect x="130" y="140" width="220" height="130" rx="6" fill="url(#screenGrad)" />
    
    <!-- Code/UI visualization on screen -->
    <rect x="145" y="155" width="60" height="10" rx="3" fill="#5A20D4" opacity="0.8" />
    <rect x="145" y="175" width="100" height="8" rx="3.5" fill="#FD6C1D" opacity="0.8" />
    <rect x="145" y="195" width="80" height="8" rx="3.5" fill="#0F172A" opacity="0.5" />
    <rect x="145" y="215" width="130" height="8" rx="3.5" fill="#0F172A" opacity="0.25" />
    
    <!-- Web interface charts visualization / circle -->
    <circle cx="300" cy="180" r="22" fill="#5A20D4" opacity="0.15" />
    <path d="M 288 185 C 295 170, 305 170, 312 185" fill="none" stroke="#5A20D4" stroke-width="3.5" stroke-linecap="round" />
    <circle cx="300" cy="183" r="3.5" fill="#FD6C1D" />

    <!-- Laptop Base Panel -->
    <path d="M 80 286 L 400 286 C 412 286, 416 294, 404 304 L 374 326 C 366 332, 354 332, 346 332 L 134 332 C 126 332, 114 332, 106 326 L 76 304 C 64 294, 68 286, 80 286 Z" fill="#E2E8F0" stroke="#0F172A" stroke-width="4.5" />
    
    <!-- Trackpad -->
    <rect x="210" y="298" width="60" height="24" rx="4" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1.5" />
    
    <!-- Front Opening notch -->
    <path d="M 225 286 L 255 286 L 250 291 L 230 291 Z" fill="#475569" />
  </g>
</svg>
